<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hệ Thống Học Tập DSA</title>
  <style>
    :root { --primary: #1e293b; --accent: #10a37f; --text: #f8fafc; }
    body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: #f1f5f9; }
    #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .login-box { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
    .login-box input { width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; text-transform: uppercase;}
    .btn-login { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    .login-status { margin-top: 15px; font-size: 0.9rem; color: #ef4444; }
    #app-container { display: none; width: 100%; height: 100%; }
    .sidebar { width: 20%; background: var(--primary); color: white; padding: 20px; box-sizing: border-box;}
    .main-view { width: 80%; position: relative; }
    .btn-logout { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 20px;}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2 style="color: var(--primary); margin-top:0;">Đăng Nhập DSA</h2>
    <p style="color: #64748b; font-size: 0.9rem;">Chỉ cần nhập Mã Sinh Viên của bạn</p>
    <input type="text" id="input-masv" placeholder="Ví dụ: SV01" onkeydown="if(event.key==='Enter') handleLogin()">
    <button class="btn-login" id="login-btn" onclick="handleLogin()">Vào Lớp Học</button>
    <div class="login-status" id="login-status"></div>
  </div>
</div>

<div id="app-container">
  <div class="sidebar">
    <h3 style="color: var(--accent); text-align: center;">KHOA CNTT</h3>
    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px;">
      <p id="display-name" style="margin: 0; font-weight: bold;"></p>
      <small id="display-masv" style="color: var(--accent);"></small>
    </div>
    <button class="btn-logout" onclick="handleLogout()">Đăng Xuất</button>
    <p style="font-size: 0.8rem; color: #94a3b8; text-align: center; margin-top: 30px;">Hệ thống sẽ chấm điểm và lưu kết quả tự động.</p>
  </div>
  <div class="main-view" id="coze-container">
    </div>
</div>

<script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.10/libs/oversea/index.js"></script>
<script>
// CẤU HÌNH CỦA BẠN
const TARGET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR1ByzBIEU-JdWgBPtDQpGGvJGNvD2wz3vPo6sfRQgEaUYfQnsJHsXtlfbhVRG3lIXYernqYW6yJlPZ/pub?gid=0&single=true&output=csv';
const COZE_BOT_ID = '7628115867796308021';
const COZE_TOKEN  = 'pat_U0Oem7qh98IjsRetrG0OJd2JuThEFHP07tVaUqZxAAm9eULukTOghV09jypTGEdJ';

async function fetchValidStudents() {
  const url = TARGET_CSV_URL + '&t=' + Date.now();
  let text = "";
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    text = await res.text();
  } catch (e) {
    try {
      const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
      const proxyRes = await fetch(proxyUrl);
      if (!proxyRes.ok) throw new Error();
      text = await proxyRes.text();
    } catch (err) { return null; }
  }
  const map = {};
  text.trim().split('\n').slice(1).forEach(row => {
    const cols = row.split(','); 
    if (cols.length > 0) {
      const id = cols[0].trim().replace(/"/g,'').toUpperCase();
      const name = cols.length > 1 ? cols[1].trim().replace(/"/g,'') : id;
      if (id) map[id] = name;
    }
  });
  return map;
}

async function handleLogin() {
  const masv = document.getElementById('input-masv').value.trim().toUpperCase();
  const sta = document.getElementById('login-status');
  const btn = document.getElementById('login-btn');
  
  if (!masv) { sta.textContent = '⚠ Vui lòng nhập Mã SV'; return; }
  
  // Bỏ qua kiểm tra nếu nhập ADMIN
  if(masv === 'ADMIN') { launchApp('ADMIN', 'Quản Trị Viên'); return; }

  btn.textContent = 'Đang kiểm tra...';
  const students = await fetchValidStudents();
  
  if (students === null) {
    sta.textContent = '❌ Lỗi mạng. Hãy up file lên host.';
    btn.textContent = 'Vào Lớp Học'; return;
  }
  
  if (!students[masv]) {
    sta.textContent = `❌ Mã "${masv}" không tồn tại!`;
    btn.textContent = 'Vào Lớp Học'; return;
  }

  // Lấy tên từ Google Sheet dựa vào Mã SV
  const studentName = students[masv];
  
  sessionStorage.setItem('dsa_masv', masv);
  sessionStorage.setItem('dsa_name', studentName);
  launchApp(masv, studentName);
}

function launchApp(masv, name) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-container').style.display = 'flex';
  document.getElementById('display-name').textContent = name;
  document.getElementById('display-masv').textContent = masv;

  // THỦ THUẬT XÓA SẠCH LỊCH SỬ 100%: Nối thêm timestamp vào ID sinh viên
  // Ví dụ: SV01_171456... Coze sẽ coi đây là người mới hoàn toàn
  const uniqueSessionId = masv + "___" + Date.now();

  new CozeWebSDK.WebChatClient({
    config: { bot_id: COZE_BOT_ID },
    componentProps: { title: 'Trợ lý Chấm Code', layout: 'pc' },
    userInfo: { 
      id: uniqueSessionId, // Gửi ID độc nhất này lên Coze
      nickname: name 
    },
    auth: { type: 'token', token: COZE_TOKEN, onRefreshToken: () => COZE_TOKEN }
  });
}

function handleLogout() {
  sessionStorage.clear();
  window.location.reload();
}

window.onload = function () {
  const masv = sessionStorage.getItem('dsa_masv');
  const name = sessionStorage.getItem('dsa_name');
  if (masv && name) launchApp(masv, name);
};
</script>
</body>
</html>
